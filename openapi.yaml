openapi: 3.0.0
info:
  title: Cookbook Recipe Management API
  description: A REST API for sharing and managing recipes
  version: 1.0.0
  contact:
    name: BalladeBaderne
    url: https://github.com/Balladebaderne/cookbook

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Health
  - name: Recipes
  - name: Ingredients
  - name: Tags
  - name: Users

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [Health]
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /api:
    get:
      summary: API info
      operationId: getApiInfo
      tags: [Health]
      responses:
        '200':
          description: API metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Cookbook API
                  version:
                    type: string
                    example: 1.0.0
                  endpoints:
                    type: object

  /api/recipe/recipes/:
    get:
      summary: Get all recipes
      operationId: getAllRecipes
      tags: [Recipes]
      responses:
        '200':
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Recipe'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      summary: Create a new recipe
      operationId: createRecipe
      tags: [Recipes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeInput'
      responses:
        '201':
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/recipe/recipes/country/{country}/:
    get:
      summary: Get recipes by country
      operationId: getRecipesByCountry
      tags: [Recipes]
      parameters:
        - name: country
          in: path
          required: true
          description: Country name (matches the recipes.country column)
          schema:
            type: string
            example: Italien
      responses:
        '200':
          description: List of recipes for that country
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Recipe'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/recipe/recipes/{id}/:
    get:
      summary: Get a recipe by ID
      operationId: getRecipeById
      tags: [Recipes]
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      responses:
        '200':
          description: Recipe found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      summary: Update a recipe
      operationId: updateRecipe
      tags: [Recipes]
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeInput'
      responses:
        '200':
          description: Recipe updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recipe'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      summary: Delete a recipe
      operationId: deleteRecipe
      tags: [Recipes]
      parameters:
        - $ref: '#/components/parameters/RecipeId'
      responses:
        '204':
          description: Recipe deleted
        '500':
          $ref: '#/components/responses/ServerError'

  /api/recipe/ingredients/:
    get:
      summary: Get all ingredients
      operationId: getAllIngredients
      tags: [Ingredients]
      responses:
        '200':
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/recipe/tags/:
    get:
      summary: Get all tags
      operationId: getAllTags
      tags: [Tags]
      responses:
        '200':
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/user/create/:
    post:
      summary: Create a user account
      operationId: createUser
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created and token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/user/token/:
    post:
      summary: Log in and get an authentication token
      operationId: createUserToken
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/user/me/:
    get:
      summary: Get the authenticated user
      operationId: getCurrentUser
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      summary: Update the authenticated user
      operationId: updateCurrentUser
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    RecipeId:
      name: id
      in: path
      required: true
      description: Recipe ID
      schema:
        type: integer
        example: 1

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Recipe:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Spaghetti Carbonara
        description:
          type: string
          example: En klassisk italiensk pastaret
        time_minutes:
          type: integer
          example: 25
        price:
          type: string
          example: "12.50"
        link:
          type: string
          example: http://example.com/carbonara
        instructions:
          type: array
          items:
            type: string
          example:
            - Kog spaghetti i saltet vand
            - Steg pancetta
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/RecipeIngredient'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'

    RecipeInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: Spaghetti Carbonara
        description:
          type: string
        time_minutes:
          type: integer
          example: 25
        price:
          type: string
          example: "12.50"
        link:
          type: string
        instructions:
          type: array
          items:
            type: string
        ingredients:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: Spaghetti
              amount:
                type: string
                example: "400"
              unit:
                type: string
                example: g
        tags:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: Italiensk

    RecipeIngredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: Spaghetti
        amount:
          type: string
          example: "400"
        unit:
          type: string
          example: g

    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: Spaghetti

    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: Italiensk

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: anna@example.com
        name:
          type: string
          example: Anna Jensen

    CreateUserRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: anna@example.com
        name:
          type: string
          example: Anna Jensen
        password:
          type: string
          format: password
          minLength: 8
          example: correct-horse-battery

    AuthRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: anna@example.com
        password:
          type: string
          format: password
          example: correct-horse-battery

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/User'

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: anna@example.com
        name:
          type: string
          example: Anna Jensen

    Error:
      type: object
      properties:
        error:
          type: string
          example: Not found
        detail:
          type: string
          example: Recipe with id 99 not found

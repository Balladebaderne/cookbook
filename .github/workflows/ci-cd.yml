name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
  workflow_dispatch:

# Serialize runs per ref so two deploys can never race (course checklist 9.5).
# A run holds the group for its whole lifetime, so the database→backend→nginx
# deploy chain stays atomic; a second push to the same ref queues behind it.
# cancel-in-progress: false — never abort an in-flight deploy.
# (Separate from the infra-level DEPLOY_OWNER lock, which guards provisioning.)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    # Postgres for the backend test suite (Postgres is the only database).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cookbook
          POSTGRES_USER: cookbook
          POSTGRES_PASSWORD: cookbook
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cookbook -d cookbook"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Test backend
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: cookbook
          POSTGRES_USER: cookbook
          POSTGRES_PASSWORD: cookbook
        run: npm test

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm test

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: dependency-audit
    # On pull requests we only want the dependency-audit gate to report — not
    # build/push images or deploy. Skipping this job also skips the deploy-*
    # jobs that need it (they're additionally gated on master/dispatch).
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: backend
            context: .
            dockerfile: ./backend/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image prefix
        id: prefix
        run: echo "value=$(echo '${{ env.IMAGE_PREFIX }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prefix.outputs.value }}/cookbook-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-three-vms-database:
    name: Deploy database to Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      vars.DEPLOY_MODE == 'three-vms' &&
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST_NGINX }} >> ~/.ssh/known_hosts

      - name: Copy Postgres compose to database VM
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o "ProxyJump=${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.DATABASE_PRIVATE_IP }} \
            "mkdir -p ~/app/blue-green"

          scp -i ~/.ssh/id_rsa \
            -o "ProxyJump=${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            deploy/blue-green/postgres.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.DATABASE_PRIVATE_IP }}:~/app/blue-green/

      - name: Start Postgres and wait for healthy
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          for value in "$POSTGRES_DB" "$POSTGRES_USER" "$POSTGRES_PASSWORD"; do
            if [ -z "$value" ]; then
              echo "Missing required Postgres secret" >&2
              exit 1
            fi
          done

          quote() { printf "%q" "$1"; }
          remote_env=(
            "POSTGRES_DB=$(quote "$POSTGRES_DB")"
            "POSTGRES_USER=$(quote "$POSTGRES_USER")"
            "POSTGRES_PASSWORD=$(quote "$POSTGRES_PASSWORD")"
          )

          ssh -i ~/.ssh/id_rsa \
            -o "ProxyJump=${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.DATABASE_PRIVATE_IP }} \
            "cd ~/app/blue-green && sudo env ${remote_env[*]} docker compose -f postgres.yml up -d --wait"

  deploy-three-vms-backend:
    name: Deploy backend to Azure VM
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-three-vms-database]
    if: |
      vars.DEPLOY_MODE == 'three-vms' &&
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST_NGINX }} >> ~/.ssh/known_hosts

      - name: Copy backend deployment files
        run: |
          ssh -i ~/.ssh/id_rsa \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }} \
            "mkdir -p ~/app/blue-green"

          ssh -i ~/.ssh/id_rsa \
            -o "ProxyJump=${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.BACKEND_PRIVATE_IP }} \
            "mkdir -p ~/app/blue-green"

          scp -i ~/.ssh/id_rsa \
            -o "ProxyJump=${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            deploy/blue-green/backend-blue-green.yml \
            deploy/blue-green/deploy-blue-green.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.BACKEND_PRIVATE_IP }}:~/app/blue-green/

          ssh -i ~/.ssh/id_rsa \
            -o "ProxyJump=${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.BACKEND_PRIVATE_IP }} \
            "chmod +x ~/app/blue-green/deploy-blue-green.sh"

      - name: Initialize active color state
        env:
          BACKEND_PRIVATE_IP: ${{ secrets.BACKEND_PRIVATE_IP }}
        run: |
          if ssh -i ~/.ssh/id_rsa \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }} \
            "test -f ~/app/blue-green/active-color.env"; then
            echo "Existing active-color.env found on nginx VM"
          else
            {
              printf "ACTIVE_COLOR=blue\n"
              printf "PREVIOUS_COLOR=green\n"
              printf "BACKEND_PRIVATE_IP=%s\n" "$BACKEND_PRIVATE_IP"
              printf "BACKEND_HOST=%s:3001\n" "$BACKEND_PRIVATE_IP"
              printf "BLUE_BACKEND_HOST=%s:3001\n" "$BACKEND_PRIVATE_IP"
              printf "GREEN_BACKEND_HOST=%s:3002\n" "$BACKEND_PRIVATE_IP"
              printf "BACKEND_IMAGE_TAG=latest\n"
              printf "FRONTEND_IMAGE_TAG=latest\n"
              printf "UPDATED_AT=%s\n" "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            } > /tmp/cookbook-active-color.env
            scp -i ~/.ssh/id_rsa \
              /tmp/cookbook-active-color.env \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}:~/app/blue-green/active-color.env
          fi

      - name: Sync active color state to backend VM
        run: |
          scp -i ~/.ssh/id_rsa \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}:~/app/blue-green/active-color.env \
            /tmp/cookbook-active-color.env

          scp -i ~/.ssh/id_rsa \
            -o "ProxyJump=${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            /tmp/cookbook-active-color.env \
            ${{ secrets.SSH_USER }}@${{ secrets.BACKEND_PRIVATE_IP }}:~/app/blue-green/active-color.env

      - name: Log in to GHCR on backend VM
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/id_rsa \
            -o "ProxyJump=${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.BACKEND_PRIVATE_IP }} \
            "sudo docker login ghcr.io -u '$GHCR_ACTOR' --password-stdin"

      - name: Deploy inactive backend and verify health
        env:
          OWNER_LC: ${{ github.repository_owner }}
          BACKEND_PRIVATE_IP: ${{ secrets.BACKEND_PRIVATE_IP }}
          DATABASE_PRIVATE_IP: ${{ secrets.DATABASE_PRIVATE_IP }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          OWNER_LC=$(echo "$OWNER_LC" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="sha-${GITHUB_SHA}"
          POSTGRES_PORT="${POSTGRES_PORT:-5432}"

          for value in "$BACKEND_PRIVATE_IP" "$DATABASE_PRIVATE_IP" "$POSTGRES_DB" "$POSTGRES_USER" "$POSTGRES_PASSWORD"; do
            if [ -z "$value" ]; then
              echo "Missing required three-vms deploy secret" >&2
              exit 1
            fi
          done

          quote() { printf "%q" "$1"; }
          remote_env=(
            "GITHUB_OWNER=$(quote "$OWNER_LC")"
            "BACKEND_IMAGE_TAG=$(quote "$IMAGE_TAG")"
            "FRONTEND_IMAGE_TAG=$(quote "$IMAGE_TAG")"
            "BACKEND_PRIVATE_IP=$(quote "$BACKEND_PRIVATE_IP")"
            "POSTGRES_HOST=$(quote "$DATABASE_PRIVATE_IP")"
            "POSTGRES_PORT=$(quote "$POSTGRES_PORT")"
            "POSTGRES_DB=$(quote "$POSTGRES_DB")"
            "POSTGRES_USER=$(quote "$POSTGRES_USER")"
            "POSTGRES_PASSWORD=$(quote "$POSTGRES_PASSWORD")"
          )

          ssh -i ~/.ssh/id_rsa \
            -o "ProxyJump=${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.BACKEND_PRIVATE_IP }} \
            "cd ~/app/blue-green && sudo env ${remote_env[*]} bash ./deploy-blue-green.sh"

  deploy-three-vms-nginx:
    name: Deploy nginx to Azure VM
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-three-vms-backend]
    if: |
      vars.DEPLOY_MODE == 'three-vms' &&
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST_NGINX }} >> ~/.ssh/known_hosts

      - name: Copy nginx deployment files
        run: |
          ssh -i ~/.ssh/id_rsa \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }} \
            "mkdir -p ~/app/blue-green"

          scp -i ~/.ssh/id_rsa \
            deploy/blue-green/nginx-blue-green.yml \
            deploy/blue-green/rollback-blue-green.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}:~/app/blue-green/

          ssh -i ~/.ssh/id_rsa \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }} \
            "chmod +x ~/app/blue-green/rollback-blue-green.sh"

      - name: Switch nginx to healthy color
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          OWNER_LC: ${{ github.repository_owner }}
        run: |
          OWNER_LC=$(echo "$OWNER_LC" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="sha-${GITHUB_SHA}"

          scp -i ~/.ssh/id_rsa \
            -o "ProxyJump=${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.BACKEND_PRIVATE_IP }}:~/app/blue-green/active-color.env \
            /tmp/cookbook-active-color.env

          scp -i ~/.ssh/id_rsa \
            /tmp/cookbook-active-color.env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}:~/app/blue-green/active-color.env

          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/id_rsa \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }} \
            "sudo docker login ghcr.io -u '$GHCR_ACTOR' --password-stdin"

          quote() { printf "%q" "$1"; }
          remote_env=(
            "GITHUB_OWNER=$(quote "$OWNER_LC")"
            "FRONTEND_IMAGE_TAG=$(quote "$IMAGE_TAG")"
          )

          ssh -i ~/.ssh/id_rsa \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }} \
            "sudo docker network create cookbook-network >/dev/null 2>&1 || true && \
             cd ~/app/blue-green && \
             sudo env ${remote_env[*]} docker compose --env-file active-color.env -f nginx-blue-green.yml pull frontend && \
             sudo env ${remote_env[*]} docker compose --env-file active-color.env -f nginx-blue-green.yml up -d frontend"

      - name: Smoke test public endpoint
        env:
          NGINX_HOST: ${{ secrets.SSH_HOST_NGINX }}
        run: |
          BASE="http://$NGINX_HOST"
          echo "Smoke testing $BASE ..."
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 --retry 5 --retry-delay 3 --retry-all-errors "$BASE/")
          echo "Frontend returned HTTP $code"
          [ "$code" = "200" ] || { echo "Frontend smoke test failed"; exit 1; }
          body=$(curl -s --max-time 15 --retry 5 --retry-delay 3 --retry-all-errors "$BASE/api/recipes/")
          echo "$body" | head -c 200; echo
          echo "$body" | grep -q '"title"' || { echo "API smoke test failed (no recipes returned)"; exit 1; }
          echo "Smoke test passed: frontend 200 + API serving recipes"

  deploy-three-vms-monitoring:
    name: Deploy monitoring stack to nginx VM
    runs-on: ubuntu-latest
    needs: [deploy-three-vms-nginx]
    if: |
      vars.DEPLOY_MODE == 'three-vms' &&
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST_NGINX }} >> ~/.ssh/known_hosts

      - name: Copy monitoring files to nginx VM
        run: |
          ssh -i ~/.ssh/id_rsa \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }} \
            "mkdir -p ~/app/monitoring/grafana/provisioning ~/app/monitoring/dashboards"

          scp -i ~/.ssh/id_rsa \
            monitoring/docker-compose.yml \
            monitoring/prometheus.prod.yml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}:~/app/monitoring/

          scp -r -i ~/.ssh/id_rsa \
            monitoring/grafana/provisioning \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}:~/app/monitoring/grafana/

          scp -r -i ~/.ssh/id_rsa \
            monitoring/dashboards \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }}:~/app/monitoring/

      - name: Render prometheus.yml and start monitoring stack
        env:
          BACKEND_PRIVATE_IP: ${{ secrets.BACKEND_PRIVATE_IP }}
          GF_ADMIN_USER: ${{ secrets.GF_ADMIN_USER }}
          GF_ADMIN_PASSWORD: ${{ secrets.GF_ADMIN_PASSWORD }}
        run: |
          if [ -z "$BACKEND_PRIVATE_IP" ]; then
            echo "Missing required secret BACKEND_PRIVATE_IP" >&2
            exit 1
          fi

          quote() { printf "%q" "$1"; }
          remote_env=(
            "GF_ADMIN_USER=$(quote "${GF_ADMIN_USER:-admin}")"
            "GF_ADMIN_PASSWORD=$(quote "${GF_ADMIN_PASSWORD:-admin}")"
          )

          ssh -i ~/.ssh/id_rsa \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_NGINX }} \
            "sudo docker network create cookbook-network >/dev/null 2>&1 || true && \
             cd ~/app/monitoring && \
             BACKEND_PRIVATE_IP=$(quote "$BACKEND_PRIVATE_IP") envsubst '\$BACKEND_PRIVATE_IP' < prometheus.prod.yml > prometheus.yml && \
             sudo env ${remote_env[*]} docker compose -f docker-compose.yml pull && \
             sudo env ${remote_env[*]} docker compose -f docker-compose.yml up -d"

      - name: Smoke test Grafana endpoint
        env:
          NGINX_HOST: ${{ secrets.SSH_HOST_NGINX }}
        run: |
          BASE="http://$NGINX_HOST"
          echo "Smoke testing $BASE/grafana/login ..."

          # Retry in-shell instead of relying on curl --retry-all-errors,
          # which has flaky interactions with -w and can exit 23 mid-run.
          code="000"
          for attempt in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$BASE/grafana/login" || echo "000")
            echo "Attempt $attempt: HTTP $code"
            case "$code" in
              200|302) break;;
            esac
            sleep 3
          done

          echo "Grafana login final HTTP $code"
          # Grafana redirects unauthenticated users; 200 (login page) or 302 (redirect to login) both mean it's up.
          case "$code" in
            200|302) echo "Grafana smoke test passed";;
            *) echo "Grafana smoke test failed"; exit 1;;
          esac

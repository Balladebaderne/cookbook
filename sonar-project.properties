# SonarQube Cloud — cookbook monorepo (backend + frontend analysed as one project)
#
# IMPORTANT: organization and projectKey must match exactly what SonarQube Cloud
# shows under your project's "Information" page after you import the repo.
# The values below are SonarCloud's default convention for GitHub org
# "Balladebaderne" / repo "cookbook" — verify them once after import.
sonar.organization=balladebaderne
sonar.projectKey=Balladebaderne_cookbook

# --- What to analyse -------------------------------------------------------
# Application source. Tests are declared separately so Sonar applies test-aware
# rules (and doesn't count test files against production coverage).
sonar.sources=backend/src,frontend/src
sonar.tests=backend/test,backend/src,frontend/src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

# Keep generated / vendored output out of the analysis entirely.
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/build/**

# --- Coverage --------------------------------------------------------------
# LCOV reports produced by `vitest run --coverage` in the CI job (see
# .github/workflows/sonarqube.yml). Paths are relative to the repo root.
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8

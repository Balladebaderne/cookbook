services:
  postgres:
    profiles: ["dev", "prod"]
    image: postgres:16
    container_name: cookbook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cookbook}
      POSTGRES_USER: ${POSTGRES_USER:-cookbook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cookbook}
    ports:
      # Published so host-run tests (npm test) can reach Postgres at 127.0.0.1:5432.
      - "5432:5432"
    volumes:
      - cookbook_pgdata:/var/lib/postgresql/data
    networks:
      - cookbook-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cookbook} -d ${POSTGRES_DB:-cookbook}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    profiles: ["prod"]
    image: ghcr.io/balladebaderne/cookbook-backend:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-cookbook}
      - POSTGRES_USER=${POSTGRES_USER:-cookbook}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cookbook}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cookbook-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    profiles: ["prod"]
    image: ghcr.io/balladebaderne/cookbook-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cookbook-network

  backend-dev:
    profiles: ["dev"]
    container_name: backend
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    environment:
      - NODE_ENV=development
      - PORT=3000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-cookbook}
      - POSTGRES_USER=${POSTGRES_USER:-cookbook}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cookbook}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cookbook-network

  frontend-dev:
    profiles: ["dev"]
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend-dev
    networks:
      - cookbook-network

volumes:
  cookbook_pgdata:
    driver: local

networks:
  cookbook-network:
    driver: bridge
    name: cookbook-network   # fixed name — no project-prefix, so monitoring stack can join

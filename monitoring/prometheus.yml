global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cookbook-backend
    static_configs:
      - targets: ["backend:3000"]
    metrics_path: /metrics

  # Container metrics (Docker containers on the host).
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Host metrics (VM CPU / RAM / disk / network).
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

# Monitoring stack — Prometheus + Grafana
#
# Prerequisites: the main app stack must be running first so
# "cookbook-network" already exists.
#
# Local dev:
#   docker compose --profile dev up -d          # start main app first
#   docker compose -f monitoring/docker-compose.yml up -d
#   Grafana: http://localhost/grafana  (via nginx)
#   Grafana direct: http://localhost:3001
#   Prometheus: http://localhost:9090
#
# Prod (nginx VM):
#   docker compose -f monitoring/docker-compose.yml up -d
#   Grafana: http://<vm>/grafana
#   Default login: admin / admin  (change on first login!)

services:
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.external-url=http://localhost:9090/"
      - "--web.route-prefix=/"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - cookbook-network

  grafana:
    image: grafana/grafana:11.6.1
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"   # direct access for local debugging
    depends_on:
      - prometheus
    networks:
      - cookbook-network

  # Container metrics (per-container CPU / memory / network / fs).
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - cookbook-network

  # Host metrics (CPU / RAM / disk / network of the VM itself).
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - cookbook-network

  # Routes Prometheus alerts to Discord + the github-receiver.
  # The Discord webhook URL is read from a gitignored bind file; the GitHub
  # token never touches this container.
  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/secrets/discord_url:/etc/alertmanager/secrets/discord_url:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - cookbook-network

  # Opens (and, with -enable-auto-close, closes) a GitHub issue per firing alert.
  # GH_ISSUE_TOKEN is a fine-grained PAT (Issues: write on Balladebaderne/cookbook)
  # supplied via the shell env in dev and via CI secrets in prod — never committed.
  github-receiver:
    image: measurementlab/alertmanager-github-receiver:latest
    container_name: github-receiver
    restart: unless-stopped
    command:
      - "-org=Balladebaderne"
      - "-repo=cookbook"
      - "-enable-auto-close"
    environment:
      - GITHUB_AUTH_TOKEN=${GH_ISSUE_TOKEN:-}
    expose:
      - "9393"
    networks:
      - cookbook-network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  cookbook-network:
    external: true

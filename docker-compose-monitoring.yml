# Monitoring stack — Prometheus + Grafana
#
# Prerequisites: the main app stack must be running first so
# "cookbook-network" already exists.
#
# Local dev:
#   docker compose --profile dev up -d          # start main app first
#   docker compose -f docker-compose-monitoring.yml up -d
#   Grafana: http://localhost/grafana  (via nginx)
#   Grafana direct: http://localhost:3001
#   Prometheus: http://localhost:9090
#
# Prod (nginx VM):
#   docker compose -f docker-compose-monitoring.yml up -d
#   Grafana: http://<vm>/grafana
#   Default login: admin / admin  (change on first login!)

services:
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.external-url=http://localhost:9090/"
      - "--web.route-prefix=/"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - cookbook-network

  grafana:
    image: grafana/grafana:11.6.1
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"   # direct access for local debugging
    depends_on:
      - prometheus
    networks:
      - cookbook-network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  cookbook-network:
    external: true
